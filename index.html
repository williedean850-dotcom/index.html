<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter 365</title>
<style>
:root{--red:#e6231e;--rbr:#ff3b30;--yel:#ffd23f;--panel:#121217;--pb:#262630;--txt:#f2f2f0;--dim:#9a9aa3;}
*{box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:radial-gradient(circle at 50% 0%,#1a0a0a,#07070a 55%);color:var(--txt);margin:0;padding:0;min-height:100vh;}
.wrap{max-width:460px;margin:0 auto;padding:18px 16px 40px;}
.hero{text-align:center;padding:14px 0 6px;}
.av{width:150px;height:150px;margin:0 auto 14px;border-radius:50%;overflow:hidden;border:3px solid var(--red);box-shadow:0 0 0 6px rgba(230,35,30,.12),0 0 30px rgba(230,35,30,.35);background:#000;}
.av img{width:100%;height:100%;object-fit:cover;object-position:center 18%;}
h1{font-size:22px;margin:0 0 4px;}
h1 span{color:var(--rbr);}
.tag{font-size:14px;color:var(--dim);margin:0 0 14px;}
.pill{display:inline-block;font-size:11px;text-transform:uppercase;color:#7CFC9A;border:1px solid #2c5c39;background:#0d1f12;padding:4px 10px;border-radius:100px;margin-bottom:14px;}
.pill::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:6px;}
.ibtn{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--red);color:var(--txt);padding:8px 16px;border-radius:100px;font-size:13px;font-weight:700;cursor:pointer;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
.mbtn{background:var(--panel);border:1px solid var(--pb);color:var(--txt);padding:16px 10px;border-radius:12px;font-size:14px;font-weight:700;text-align:center;cursor:pointer;}
.mbtn .ic{display:block;font-size:22px;margin-bottom:6px;}
.full{grid-column:1/-1;background:linear-gradient(135deg,var(--red),#a8120e);border:none;font-size:15px;}
.pg{display:none;}
.pg.on{display:block;}
#home{display:none;}
#home.on{display:block;}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
